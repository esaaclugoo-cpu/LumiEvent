<!--
  Formulario de Usuario - formUsuario.html
  Propósito: Crear o editar usuario (cliente o administrador).
  Contenido del formulario:
    1. Nombre: nombre del usuario
    2. Email: email único (validación en backend)
    3. Password: contraseña en texto plano (se almacena sin encriptar en BD - mejora: usar BCrypt)
    4. Tipo Usuario: selector para elegir CLIENTE o ADMIN

  Atributos Thymeleaf principales:
    - th:object="${usuario}": vincula objeto usuario del modelo
    - th:field: vincula atributos del objeto a inputs
    - th:each: tipo : ${tiposUsuario} - itera sobre enumerados de tipo
    - th:text: muestra encabezado dinámico (Agregar vs Editar)

  Modelos pasados:
    - usuario: Usuario - objeto con id, nombre, email, password, tipo_usuario
    - usuario.id: 0 si es nuevo, > 0 si es edición
    - tiposUsuario: List<UsuarioEnum> o List<String> - valores de tipos disponibles

  Procesamiento:
    - POST a /usuarios/guardar (para ambas operaciones)

  Validación en backend:
    - Email debe ser único
    - Nombre y password obligatorios
    - Tipo usuario debe ser válido (admin o cliente)

  Flujo:
    1. Crear: GET /usuarios/nuevo muestra formulario vacío
    2. Editar: GET /usuarios/editar/{id} carga usuario en formulario
    3. Guardar: POST /usuarios/guardar procesa ambos casos

  Notas de seguridad: Las contraseñas deben encriptarse (mejora futura: implementar BCrypt).
-->
<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="NovaTicket - Formulario de usuario.">
    <meta name="robots" content="noindex, nofollow">
    <title>Formulario Usuario - NovaTicket Admin</title>
    <link rel="icon" th:href="@{/img/logo.png}" href="/img/logo.png" type="image/png">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link th:href="@{/css/styles.css}" rel="stylesheet">
</head>
<body class="admin-panel">
<header>
    <nav class="nt-navbar nt-navbar-admin" aria-label="Navegacion formulario usuarios">
        <div class="container position-relative d-flex justify-content-center align-items-center">
            <a th:href="@{/admin}" class="nt-admin-back btn btn-outline-secondary btn-sm">Volver a admin</a>
            <a th:href="@{/admin}" class="nt-brand" aria-label="Panel admin NovaTicket">
                <img th:src="@{/img/logo2.png}" src="/img/logo2.png" alt="NovaTicket" class="nt-logo">
            </a>
        </div>
    </nav>
</header>

<main class="container mt-4">
    <h2 th:text="${usuario.id == 0} ? 'Agregar Usuario' : 'Editar Usuario'"></h2>
    <div th:if="${errorMensaje}" class="alert alert-danger" th:text="${errorMensaje}"></div>

    <form th:action="@{/usuarios/guardar}" th:object="${usuario}" method="post">
        <input type="hidden" th:field="*{id}" />

        <div class="mb-3">
            <label for="nombre" class="form-label">Nombre</label>
            <input type="text" class="form-control" id="nombre" th:field="*{nombre}" required />
        </div>

        <div class="mb-3">
            <label for="email" class="form-label">Email</label>
            <input type="email" class="form-control" id="email" th:field="*{email}" required />
        </div>

        <div class="mb-3">
            <label for="password" class="form-label">Password</label>
            <input type="text" class="form-control" id="password" th:field="*{password}" required />
        </div>

        <div class="mb-3">
            <label for="tipoUsuario" class="form-label">Tipo Usuario</label>
            <select class="form-select" id="tipoUsuario" th:field="*{tipo_usuario}" required>
                <option th:each="tipo : ${tiposUsuario}" th:value="${tipo}" th:text="${tipo}"></option>
            </select>
        </div>

        <button type="submit" class="btn btn-primary">Guardar</button>
        <a th:href="@{/usuarios}" class="btn btn-secondary">Cancelar</a>
        <a th:href="@{/admin}" class="btn btn-outline-secondary">Volver a admin</a>
    </form>
</main>
</body>
</html>
