<!--
  Formulario de Compra - formCompra.html
  Propósito: Crear o editar una compra registrada en el sistema.
  Contenido del formulario:
    1. Usuario: selector desplegable con todos los usuarios registrados
    2. Fecha y hora: datetime-local input
    3. Total: monto total de la compra (number con paso 0.01)

  Atributos Thymeleaf principales:
    - th:object="${compra}": vincula objeto compra del modelo
    - th:field: vincula atributos del objeto a inputs
    - th:each: usuario : ${usuarios} - itera para llenar selector
    - th:text: muestra opción con nombre + email del usuario
    - th:errors: muestra errores de validación (ej: fecha inválida)

  Modelos pasados:
    - compra: Compra - objeto con id, id_usuario, fecha, total
    - compra.id: 0 si es nuevo, > 0 si es edición
    - usuarios: List<Usuario> - para llenar selector
    - errorMensaje: mensaje de error (si hay)

  Procesamiento:
    - POST a /compras/guardar (para ambas operaciones)

  Validación en backend:
    - Usuario obligatorio y válido
    - Fecha debe ser válida (formato datetime-local)
    - Total obligatorio y positivo

  Flujo:
    1. Crear: GET /compras/nuevo muestra formulario vacío
    2. Editar: GET /compras/editar/{id} carga compra en formulario
    3. Guardar: POST /compras/guardar procesa ambos casos

  Nota: En la plataforma real, las compras se crean automáticamente al pagar carrito,
        no manualmente. Este formulario es para administración/correcciones.
-->
<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="NovaTicket - Formulario de compra.">
    <meta name="robots" content="noindex, nofollow">
    <title>Formulario Compra - NovaTicket Admin</title>
    <link rel="icon" th:href="@{/img/logo.png}" href="/img/logo.png" type="image/png">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link th:href="@{/css/styles.css}" rel="stylesheet">
</head>
<body class="admin-panel">
<header>
    <nav class="nt-navbar nt-navbar-admin" aria-label="Navegacion formulario compras">
        <div class="container position-relative d-flex justify-content-center align-items-center">
            <a th:href="@{/admin}" class="nt-admin-back btn btn-outline-secondary btn-sm">Volver a admin</a>
            <a th:href="@{/admin}" class="nt-brand" aria-label="Panel admin NovaTicket">
                <img th:src="@{/img/logo2.png}" src="/img/logo2.png" alt="NovaTicket" class="nt-logo">
            </a>
        </div>
    </nav>
</header>

<main class="container mt-4">
    <h2 th:text="${compra.id == 0} ? 'Agregar Compra' : 'Editar Compra'"></h2>

    <div th:if="${errorMensaje}" class="alert alert-danger" th:text="${errorMensaje}"></div>

    <form th:action="@{/compras/guardar}" th:object="${compra}" method="post">
        <input type="hidden" th:field="*{id}" />

        <div class="mb-3">
            <label for="idUsuario" class="form-label">Usuario</label>
            <select class="form-select" id="idUsuario" th:field="*{id_usuario}" required>
                <option value="0" disabled th:selected="*{id_usuario == 0}">Selecciona un usuario</option>
                <option th:each="usuario : ${usuarios}" th:value="${usuario.id}" th:text="${usuario.nombre + ' (' + usuario.email + ')'}"></option>
            </select>
        </div>

        <div class="mb-3">
            <label for="fecha" class="form-label">Fecha y hora</label>
            <input type="datetime-local" class="form-control" id="fecha" th:field="*{fecha}" required />
            <div class="text-danger" th:if="${#fields.hasErrors('fecha')}" th:errors="*{fecha}"></div>
        </div>

        <div class="mb-3">
            <label for="total" class="form-label">Total</label>
            <input type="number" class="form-control" id="total" th:field="*{total}" step="0.01" min="0" required />
        </div>

        <button type="submit" class="btn btn-primary">Guardar</button>
        <a th:href="@{/compras}" class="btn btn-secondary">Cancelar</a>
        <a th:href="@{/admin}" class="btn btn-outline-secondary">Volver a admin</a>
    </form>
</main>
</body>
</html>
