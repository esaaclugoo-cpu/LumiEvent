<!--
  Formulario de Evento - formEvento.html
  Propósito: Crear o editar evento con campos comunes y específicos por tipo.
  Contenido del formulario:
    1. Campos comunes (todos los eventos):
       - Nombre, Descripción, Fecha (con validación de fecha mínima)
       - Aforo máximo, Tipo evento (selector concierto/teatro/museo)
       - Lugar (selector de lugares registrados)
       - Imagen (file input, acepta image/*)

    2. Campos específicos (ocultos por defecto, mostrados según tipo_evento):
       - CONCIERTO: Artista Principal, Género Musical, Duración (minutos)
       - TEATRO: Obra, Director
       - MUSEO: Nombre Exposición, Tipo Exposición, Fecha Fin

  Atributos Thymeleaf principales:
    - th:object="${evento}": vincula objeto evento del modelo
    - th:field: vincula atributos del objeto a inputs (genera nombres automáticamente)
    - th:if, th:unless: muestra campos fecha con/sin validación según edición
    - th:attr: establece atributo min con fecha actual (solo en creación)
    - th:each: lugar : ${lugares} - itera para llenar selector
    - th:text: muestra opción del selector con nombre + ciudad del lugar
    - th:src: muestra imagen actual (si existe) en sección previa

  Modelos pasados:
    - evento: Evento - objeto con id, nombre, descripción, fecha, etc.
    - evento.id: 0 si es nuevo, > 0 si es edición
    - evento.tipo_evento: enum actual (usado para mostrar valores guardados)
    - evento.ruta_imagen: ruta de imagen actual (puede ser null)
    - lugares: List<Lugar> - para llenar selector

  Procesamiento:
    - POST a /eventos/guardar (si evento.id == 0)
    - POST a /eventos/actualizar (si evento.id > 0)
    - enctype="multipart/form-data" para subida de imagen
    - Imagen antigua se elimina al subir nueva (backend)

  JavaScript en app.js:
    - Show/hide campos específicos según selector tipo_evento
    - Inicializa campos visibles según valor guardado (en edición)
-->
<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="NovaTicket - Formulario de evento.">
    <meta name="robots" content="noindex, nofollow">
    <title>Formulario Evento - NovaTicket Admin</title>
    <link rel="icon" th:href="@{/img/logo.png}" href="/img/logo.png" type="image/png">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link th:href="@{/css/styles.css}" rel="stylesheet">
</head>
<body class="admin-panel">
<header>
    <nav class="nt-navbar nt-navbar-admin" aria-label="Navegacion formulario eventos">
        <div class="container position-relative d-flex justify-content-center align-items-center">
            <a th:href="@{/admin}" class="nt-admin-back btn btn-outline-secondary btn-sm">Volver a admin</a>
            <a th:href="@{/admin}" class="nt-brand" aria-label="Panel admin NovaTicket">
                <img th:src="@{/img/logo2.png}" src="/img/logo2.png" alt="NovaTicket" class="nt-logo">
            </a>
        </div>
    </nav>
</header>

<main class="container mt-4">
    <h2 th:text="${evento.id == 0} ? 'Agregar Evento' : 'Editar Evento'"></h2>
    <div th:if="${errorMensaje}" class="alert alert-danger" th:text="${errorMensaje}"></div>
    <form th:action="@{/eventos/{accion}(accion=${evento.id == 0 ? 'guardar' : 'actualizar'})}" th:object="${evento}" method="post" enctype="multipart/form-data">
        <input type="hidden" th:field="*{id}" />
        <input type="hidden" th:field="*{ruta_imagen}" />

        <div class="mb-3">
            <label for="nombre" class="form-label">Nombre</label>
            <input type="text" class="form-control" id="nombre" th:field="*{nombre}" required />
        </div>

        <div class="mb-3">
            <label for="descripcion" class="form-label">Descripción</label>
            <input type="text" class="form-control" id="descripcion" th:field="*{descripcion}" required />
        </div>

        <div class="mb-3">
            <label class="form-label">Fecha</label>
            <input type="date" class="form-control" id="fechaNuevo" th:if="${evento.id == 0}"
                   th:field="*{fecha}" th:attr="min=${#temporals.format(#temporals.createNow(), 'yyyy-MM-dd')}" max="9999-12-31" required />
            <input type="date" class="form-control" id="fechaEdicion" th:unless="${evento.id == 0}" th:field="*{fecha}" max="9999-12-31" required />
        </div>

        <div class="mb-3">
            <label for="aforoMaximo" class="form-label">Aforo Máximo</label>
            <input type="number" class="form-control" id="aforoMaximo" th:field="*{aforo_maximo}" required />
        </div>


        <div class="mb-3">
            <label for="tipoEvento" class="form-label">Tipo Evento</label>
            <select class="form-select" id="tipoEvento" th:field="*{tipo_evento}" required>
                <option th:value="concierto">Concierto</option>
                <option th:value="teatro">Teatro</option>
                <option th:value="museo">Museo</option>
            </select>
        </div>

        <div class="mb-3">
            <label for="idLugar" class="form-label">Lugar</label>
            <select class="form-select" id="idLugar" th:field="*{id_lugar}" required>
                <option value="0" disabled th:selected="*{id_lugar == 0}">Selecciona un lugar</option>
                <option th:each="lugar : ${lugares}"
                        th:value="${lugar.id}"
                        th:text="${lugar.nombre + ' - ' + lugar.ciudad}">
                </option>
            </select>
        </div>

        <div class="mb-3">
            <label for="imagenFile" class="form-label">Imagen del evento</label>
            <input type="file" class="form-control" id="imagenFile" name="imagenFile" accept="image/*" />
            <small class="text-muted">Si no subes una nueva imagen, se conserva la actual.</small>
        </div>

        <div class="mb-3" th:if="${evento.ruta_imagen != null and !#strings.isEmpty(evento.ruta_imagen)}">
            <label class="form-label">Imagen actual</label>
            <div>
                <img th:src="@{/uploads/{img}(img=${evento.ruta_imagen})}" alt="Imagen actual del evento" style="max-width: 220px; border-radius: 8px;" />
            </div>
        </div>

        <!-- Campos específicos de subclases -->
        <div class="mb-3 tipo-specific" id="concierto-fields" style="display:none;">
            <h5>Campos para Concierto</h5>
            <label for="artistaPrincipal" class="form-label">Artista Principal</label>
            <input type="text" class="form-control" id="artistaPrincipal" th:field="*{artista_principal}" />

            <label for="generoMusical" class="form-label">Género Musical</label>
            <input type="text" class="form-control" id="generoMusical" th:field="*{genero_musical}" />

            <label for="duracionMinutos" class="form-label">Duración (minutos)</label>
            <input type="number" class="form-control" id="duracionMinutos" th:field="*{duracion_minutos}" />
        </div>

        <div class="mb-3 tipo-specific" id="teatro-fields" style="display:none;">
            <h5>Campos para Teatro</h5>
            <label for="obra" class="form-label">Obra</label>
            <input type="text" class="form-control" id="obra" th:field="*{obra}" />

            <label for="director" class="form-label">Director</label>
            <input type="text" class="form-control" id="director" th:field="*{director}" />
        </div>

        <div class="mb-3 tipo-specific" id="museo-fields" style="display:none;">
            <h5>Campos para Museo</h5>
            <label for="nombreExposicion" class="form-label">Nombre Exposición</label>
            <input type="text" class="form-control" id="nombreExposicion" th:field="*{nombre_exposicion}" />

            <label for="tipoExposicion" class="form-label">Tipo Exposición</label>
            <input type="text" class="form-control" id="tipoExposicion" th:field="*{tipo_exposicion}" />

            <label for="fechaFin" class="form-label">Fecha Fin</label>
            <input type="date" class="form-control" id="fechaFin" th:field="*{fecha_fin}" />
        </div>

        <button type="submit" class="btn btn-primary">Guardar</button>
        <a th:href="@{/eventos}" class="btn btn-secondary">Cancelar</a>
        <a th:href="@{/admin}" class="btn btn-outline-secondary">Volver a admin</a>
    </form>
</main>

<script th:src="@{/js/app.js}" src="/js/app.js"></script>

</body>
</html>
