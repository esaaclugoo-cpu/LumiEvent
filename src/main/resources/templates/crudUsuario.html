<!--
  Listado de Usuarios - crudUsuario.html
  Propósito: Mostrar tabla CRUD de todos los usuarios registrados (clientes y admins).
  Contenido: Tabla con columnas:
    1. Nombre: nombre del usuario
    2. Email: email de contacto
    3. Password: mostrado como viñetas (••••••) por seguridad
    4. Tipo: badge con tipo_usuario (CLIENTE=azul, ADMIN=rojo)
    5. Acciones: botones Editar y Eliminar

  Atributos Thymeleaf principales:
    - th:each: usuario : ${usuarios} - itera sobre lista de usuarios
    - th:text: muestra valores de usuario
    - th:classappend: aplica clase badge bg-danger si es admin, bg-primary si es cliente
    - th:href: rutas dinámicas a editar (/usuarios/editar/{id}) y eliminar

  Modelos pasados:
    - usuarios: List<Usuario> - todos los usuarios
    - usuario.tipo_usuario: enum UsuarioEnum (admin/cliente)

  Acciones:
    - Nuevo usuario: botón verde que lleva a /usuarios/nuevo
    - Editar: GET a /usuarios/editar/{id} carga formulario con datos
    - Eliminar: GET a /usuarios/eliminar/{id} elimina usuario y redirecciona

  Seguridad: Las contraseñas jamás se muestran en texto plano (solo viñetas).

  Relaciones: Usuario -> tiene muchas compras -> tiene muchos tickets
-->
<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="NovaTicket - Gestion de usuarios.">
    <meta name="robots" content="noindex, nofollow">
    <title>Usuarios - NovaTicket Admin</title>
    <link rel="icon" th:href="@{/img/logo.png}" href="/img/logo.png" type="image/png">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link th:href="@{/css/styles.css}" rel="stylesheet">
</head>
<body class="admin-panel">
<header>
    <nav class="nt-navbar nt-navbar-admin" aria-label="Navegacion usuarios admin">
        <div class="container position-relative d-flex justify-content-center align-items-center">
            <a th:href="@{/admin}" class="nt-admin-back btn btn-outline-secondary btn-sm">Volver a admin</a>
            <a th:href="@{/admin}" class="nt-brand" aria-label="Panel admin NovaTicket">
                <img th:src="@{/img/logo2.png}" src="/img/logo2.png" alt="NovaTicket" class="nt-logo">
            </a>
        </div>
    </nav>
</header>

<main class="container mt-4 crud-container">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h2>Listado de Usuarios</h2>
        <div>
            <a th:href="@{/usuarios/nuevo}" class="btn btn-success">Nuevo Usuario</a>
        </div>
    </div>

    <div th:if="${okMensaje}" class="alert alert-success" th:text="${okMensaje}"></div>
    <div th:if="${errorMensaje}" class="alert alert-danger" th:text="${errorMensaje}"></div>

    <div class="table-responsive">
    <table class="table table-bordered table-striped table-hover align-middle">
        <thead class="table-dark">
        <tr>
            <th>Nombre</th>
            <th>Email</th>
            <th>Password</th>
            <th>Tipo</th>
            <th>Acciones</th>
        </tr>
        </thead>
        <tbody>
        <tr th:if="${#lists.isEmpty(usuarios)}">
            <td colspan="5" class="text-center">No hay usuarios registrados.</td>
        </tr>
        <tr th:each="usuario : ${usuarios}">
            <td th:text="${usuario.nombre}"></td>
            <td th:text="${usuario.email}"></td>
            <td><span class="text-muted fst-italic">••••••••</span></td>
            <td>
                <span th:text="${usuario.tipo_usuario}"
                      th:classappend="${usuario.tipo_usuario != null and usuario.tipo_usuario.name() == 'admin'} ? 'badge bg-danger' : 'badge bg-primary'"></span>
            </td>
            <td>
                <a th:href="@{/usuarios/editar/{id}(id=${usuario.id})}" class="btn btn-warning btn-sm">Editar</a>
                <a th:href="@{/usuarios/eliminar/{id}(id=${usuario.id})}" class="btn btn-danger btn-sm">Eliminar</a>
            </td>
        </tr>
        </tbody>
    </table>
    </div>
</main>
</body>
</html>
