<!--
  Formulario de Asiento - formAsiento.html
  Propósito: Crear individual o masivamente asientos, o editar existentes.
  Flujo diferenciado según edición o creación:

  CREACIÓN (asiento.id == 0):
    1. Selector de lugar (obligatorio)
    2. Campo fila: una letra para agrupar asientos (ej: A)
    3. Bloque masivo: 3 inputs para cantidad (general, vip, premium)
    4. Sistema: crea secuencialmente asientos 1, 2, 3... numerados para esa fila y zona

  EDICIÓN (asiento.id > 0):
    1. Selector de lugar (obligatorio) - puede cambiar lugar
    2. Campo fila (obligatorio) - puede cambiar fila
    3. Número asiento: field number individual
    4. Zona: selector (general/vip/premium)

  Atributos Thymeleaf principales:
    - th:object="${asiento}": vincula objeto asiento
    - th:field: vincula atributos a inputs
    - th:if, th:unless: muestra bloques diferentes según creación o edición
    - th:each: lugar : ${lugares} - itera lugares

  Modelos pasados:
    - asiento: Asiento - objeto con id, id_lugar, fila, numero_asiento, zona
    - asiento.id: 0 si es nuevo, > 0 si es edición
    - lugares: Map<Integer, String> - mapeo id -> nombre lugar

  Procesamiento:
    - POST a /asientos/guardar (para ambas operaciones)
    - En creación: cantidadGeneral, cantidadVip, cantidadPremium son campos name adicionales
    - En edición: solo numero_asiento y zona se editan

  Validación en backend:
    - id_lugar obligatorio y válido
    - fila obligatoria para creación masiva
    - En edición: número y zona requeridos
    - Cantidades masivas no pueden ser negativas
-->
<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="NovaTicket - Formulario de asiento.">
    <meta name="robots" content="noindex, nofollow">
    <title>Formulario Asiento - NovaTicket Admin</title>
    <link rel="icon" th:href="@{/img/logo.png}" href="/img/logo.png" type="image/png">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link th:href="@{/css/styles.css}" rel="stylesheet">
</head>
<body class="admin-panel">
<header>
    <nav class="nt-navbar nt-navbar-admin" aria-label="Navegacion formulario asientos">
        <div class="container position-relative d-flex justify-content-center align-items-center">
            <a th:href="@{/admin}" class="nt-admin-back btn btn-outline-secondary btn-sm">Volver a admin</a>
            <a th:href="@{/admin}" class="nt-brand" aria-label="Panel admin NovaTicket">
                <img th:src="@{/img/logo2.png}" src="/img/logo2.png" alt="NovaTicket" class="nt-logo">
            </a>
        </div>
    </nav>
</header>

<main class="container mt-4">
    <h2 th:text="${asiento.id == 0} ? 'Agregar Asiento' : 'Editar Asiento'"></h2>
    <div th:if="${errorMensaje}" class="alert alert-danger" th:text="${errorMensaje}"></div>

    <form th:action="@{/asientos/guardar}" th:object="${asiento}" method="post">
        <input type="hidden" th:field="*{id}" />

        <div class="mb-3">
            <label for="idLugar" class="form-label">Lugar</label>
            <select class="form-select" id="idLugar" th:field="*{id_lugar}" required>
                <option th:value="0" disabled th:selected="*{id_lugar == 0}">Selecciona un lugar</option>
                <option th:each="lugar : ${lugares}"
                        th:value="${lugar.key}"
                        th:text="${lugar.value + ' (ID ' + lugar.key + ')'}"></option>
            </select>
        </div>

        <div class="mb-3">
            <label for="fila" class="form-label">Fila</label>
            <input type="text" class="form-control" id="fila" th:field="*{fila}" placeholder="Ej: A" required />
            <div class="form-text">Todos los asientos del alta masiva se crearan bajo esta fila. Puedes repetir la operacion con otra fila para agregar mas.</div>
        </div>

        <!-- Solo en edicion: numero y zona individual -->
        <div th:if="${asiento.id > 0}">
            <div class="mb-3">
                <label for="numeroAsiento" class="form-label">Numero de Asiento</label>
                <input type="number" class="form-control" id="numeroAsiento" th:field="*{numero_asiento}" min="1" required />
            </div>
            <div class="mb-3">
                <label for="zona" class="form-label">Zona</label>
                <select class="form-select" id="zona" th:field="*{zona}" required>
                    <option value="" disabled th:selected="*{zona == null or #strings.isEmpty(zona)}">Selecciona una zona</option>
                    <option value="general">General</option>
                    <option value="vip">VIP</option>
                    <option value="premium">Premium</option>
                </select>
            </div>
        </div>

        <!-- Solo en alta nueva: bloque masivo -->
        <div th:if="${asiento.id == 0}" class="form-section-box">
            <h5 class="mb-3">Cantidad de asientos por tipo</h5>
            <p class="text-muted small">Se crearan asientos numerados correlativos para la fila indicada.</p>
            <div class="row">
                <div class="col-md-4 mb-2">
                    <label for="cantidadGeneral" class="form-label">General</label>
                    <input type="number" class="form-control" id="cantidadGeneral" name="cantidadGeneral" min="0" value="0" />
                </div>
                <div class="col-md-4 mb-2">
                    <label for="cantidadVip" class="form-label">VIP</label>
                    <input type="number" class="form-control" id="cantidadVip" name="cantidadVip" min="0" value="0" />
                </div>
                <div class="col-md-4 mb-2">
                    <label for="cantidadPremium" class="form-label">Premium</label>
                    <input type="number" class="form-control" id="cantidadPremium" name="cantidadPremium" min="0" value="0" />
                </div>
            </div>
        </div>

        <button type="submit" class="btn btn-primary">Guardar</button>
        <a th:href="@{/asientos}" class="btn btn-secondary">Cancelar</a>
        <a th:href="@{/admin}" class="btn btn-outline-secondary">Volver a admin</a>
    </form>
</main>
</body>
</html>
