<!--
  Página de Registro de Usuarios - registro.html
  Propósito: Permitir crear nuevas cuentas de usuario (tipo CLIENTE).
  Flujo: Recibe nombre, email y contraseña, registra usuario en AuthController.
  Atributos Thymeleaf usados:
    - th:href: rutas dinámicas hacia login y home
    - th:if: mostrar mensaje de error si hay
    - th:action: envía form POST a /registro
  Forma de procesamiento: POST a /registro con nombre, email y password
  Notas: Nuevos usuarios se crean siempre como CLIENTE, no admin.
-->
<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="Crea tu cuenta en NovaTicket y empieza a comprar entradas para eventos.">
    <meta name="robots" content="index, follow">
    <title>Registro - NovaTicket</title>
    <link rel="icon" th:href="@{/img/logo.png}" href="/img/logo.png" type="image/png">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link th:href="@{/css/styles.css}" rel="stylesheet">
</head>
<body>
<header>
    <nav class="nt-navbar" aria-label="Navegacion de registro">
        <div class="container d-flex align-items-center justify-content-center">
            <a th:href="@{/cliente/home}" class="nt-brand" aria-label="Inicio NovaTicket">
                <img th:src="@{/img/logo2.png}" src="/img/logo2.png" alt="NovaTicket" class="nt-logo">
            </a>
        </div>
    </nav>
</header>

<main class="auth-wrapper">
    <div class="auth-card">
    <h1 class="auth-brand-title">Crear cuenta</h1>
    <p class="text-muted">Las cuentas registradas aqui se crean como cliente.</p>

    <div th:if="${errorMensaje}" class="alert alert-danger" th:text="${errorMensaje}"></div>

    <form th:action="@{/registro}" method="post" class="card card-body shadow-sm">
        <div class="mb-3">
            <label for="nombre" class="form-label">Nombre</label>
            <input id="nombre" name="nombre" type="text" class="form-control" required>
        </div>

        <div class="mb-3">
            <label for="email" class="form-label">Email</label>
            <input id="email" name="email" type="email" class="form-control" required>
        </div>

        <div class="mb-3">
            <label for="password" class="form-label">Contrasena</label>
            <input id="password" name="password" type="password" class="form-control" required>
        </div>

        <button type="submit" class="btn btn-primary">Registrarme</button>
    </form>

    <div class="mt-3 d-flex gap-2">
        <a th:href="@{/login}" class="btn btn-outline-primary">Ya tengo cuenta</a>
        <a th:href="@{/cliente/home}" class="btn btn-outline-secondary">Volver al home</a>
    </div>
    </div>
</main>
</body>
</html>
