<!--
  Formulario de Ticket - formTicket.html
  Propósito: Crear o editar tickets vinculados a eventos. En creación, permite alta masiva.
  Contenido del formulario:
    1. Evento: selector desplegable con todos los eventos
    2. Hidden fields: id_asiento e id_compra (se rellenan automáticamente o por admin)
    3. Bloque masivo cantidad: 3 inputs para cantidad (general/vip/premium)
    4. Bloque masivo precio: 3 inputs para precio unitario (general/vip/premium)

  Atributos Thymeleaf principales:
    - th:object="${ticket}": vincula objeto ticket del modelo
    - th:field: vincula atributos del objeto a inputs
    - th:each: evento : ${eventos} - itera para llenar selector
    - th:text: muestra encabezado dinámico (Agregar vs Editar)

  Modelos pasados:
    - ticket: Ticket - objeto con id, id_evento, id_asiento, id_compra, tipo, cantidad, precio_unitario
    - ticket.id: 0 si es nuevo, > 0 si es edición
    - eventos: List<Evento> - para llenar selector

  Procesamiento:
    - POST a /tickets/guardar (para ambas operaciones)
    - En creación: cantidadGeneral, cantidadVip, cantidadPremium son campos name adicionales
    - En creación: precioGeneral, precioVip, precioPremium son campos name adicionales

  Validación en backend:
    - Evento obligatorio y válido
    - En creación: se crean tantos tickets como suma de cantidades
    - Cantidades y precios no pueden ser negativos

  Flujo:
    1. Crear: GET /tickets/nuevo muestra formulario con selector evento
    2. Editar: GET /tickets/editar/{id} carga ticket en formulario (raramente usado)
    3. Guardar: POST /tickets/guardar procesa ambos casos

  Nota: Los tickets se crean principalmente al pagar carrito (flow automático),
        este formulario es para administración/correcciones manuales.

  Precios por defecto: General 25.00, VIP 50.00, Premium 80.00 EUR
-->
<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="NovaTicket - Formulario de tickets.">
    <meta name="robots" content="noindex, nofollow">
    <title>Formulario Ticket - NovaTicket Admin</title>
    <link rel="icon" th:href="@{/img/logo.png}" href="/img/logo.png" type="image/png">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link th:href="@{/css/styles.css}" rel="stylesheet">
</head>
<body class="admin-panel">
<header>
    <nav class="nt-navbar nt-navbar-admin" aria-label="Navegacion formulario tickets">
        <div class="container position-relative d-flex justify-content-center align-items-center">
            <a th:href="@{/admin}" class="nt-admin-back btn btn-outline-secondary btn-sm">Volver a admin</a>
            <a th:href="@{/admin}" class="nt-brand" aria-label="Panel admin NovaTicket">
                <img th:src="@{/img/logo2.png}" src="/img/logo2.png" alt="NovaTicket" class="nt-logo">
            </a>
        </div>
    </nav>
</header>

<main class="container mt-4">
    <h2 th:text="${ticket.id == 0} ? 'Agregar Tickets' : 'Editar Ticket'"></h2>
    <div th:if="${errorMensaje}" class="alert alert-danger" th:text="${errorMensaje}"></div>

    <form th:action="@{/tickets/guardar}" th:object="${ticket}" method="post">
        <input type="hidden" th:field="*{id}" />

        <div class="mb-3">
            <label for="idEvento" class="form-label">Evento</label>
            <select class="form-select" id="idEvento" th:field="*{id_evento}" required>
                <option value="0" disabled th:selected="*{id_evento == 0}">Selecciona un evento</option>
                <option th:each="evento : ${eventos}" th:value="${evento.id}" th:text="${evento.nombre}"></option>
            </select>
        </div>

        <input type="hidden" th:field="*{id_asiento}" />
        <input type="hidden" th:field="*{id_compra}" />

        <div class="form-section-box">
            <h5 class="mb-3">Cantidad de Tickets por Tipo</h5>
            <p class="text-muted small">Define cuántos tickets se agregarán para cada tipo. Se crearán registros de tickets automáticamente.</p>

            <div class="row">
                <div class="col-md-4">
                    <label for="cantidadGeneral" class="form-label">General</label>
                    <input type="number" class="form-control" id="cantidadGeneral" name="cantidadGeneral" min="0" step="1" value="0" />
                </div>
                <div class="col-md-4">
                    <label for="cantidadVip" class="form-label">VIP</label>
                    <input type="number" class="form-control" id="cantidadVip" name="cantidadVip" min="0" step="1" value="0" />
                </div>
                <div class="col-md-4">
                    <label for="cantidadPremium" class="form-label">Premium</label>
                    <input type="number" class="form-control" id="cantidadPremium" name="cantidadPremium" min="0" step="1" value="0" />
                </div>
            </div>
        </div>

        <div class="form-section-box">
            <h5 class="mb-3">Precio Unitario por Tipo</h5>

            <div class="row">
                <div class="col-md-4">
                    <label for="precioGeneral" class="form-label">Precio General</label>
                    <input type="number" class="form-control" id="precioGeneral" name="precioGeneral" step="0.01" min="0" value="25.00" required />
                </div>
                <div class="col-md-4">
                    <label for="precioVip" class="form-label">Precio VIP</label>
                    <input type="number" class="form-control" id="precioVip" name="precioVip" step="0.01" min="0" value="50.00" required />
                </div>
                <div class="col-md-4">
                    <label for="precioPremium" class="form-label">Precio Premium</label>
                    <input type="number" class="form-control" id="precioPremium" name="precioPremium" step="0.01" min="0" value="80.00" required />
                </div>
            </div>
        </div>

        <button type="submit" id="btnGuardarTicket" class="btn btn-primary">Guardar Tickets</button>
        <a th:href="@{/tickets}" class="btn btn-secondary">Cancelar</a>
    <a th:href="@{/admin}" class="btn btn-outline-secondary">Volver a admin</a>
    </form>
</main>


</body>
</html>
