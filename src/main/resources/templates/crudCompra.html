<!--
  Listado de Compras - crudCompra.html
  Propósito: Mostrar tabla CRUD de todas las compras registradas en el sistema.
  Contenido: Tabla con columnas:
    1. Usuario: nombre del usuario que realizó la compra (traducción desde ID)
    2. Fecha: fecha y hora de la compra
    3. Total: monto total de la compra
    4. Acciones: botones Editar y Eliminar

  Atributos Thymeleaf principales:
    - th:each: compra : ${compras} - itera sobre lista de compras
    - th:text: muestra valores de compra
    - usuariosMap[compra.id_usuario]: Map que traduce ID de usuario a nombre
    - th:href: rutas dinámicas a editar (/compras/editar/{id}) y eliminar

  Modelos pasados:
    - compras: List<Compra> - todas las compras
    - usuariosMap: Map<Integer, String> - mapeo id_usuario -> nombre usuario

  Acciones:
    - Nueva compra: botón verde que lleva a /compras/nuevo
    - Editar: GET a /compras/editar/{id} carga formulario
    - Eliminar: GET a /compras/eliminar/{id} elimina compra y redirecciona

  Relaciones: Compra <- tiene muchos tickets (ON DELETE CASCADE)

  Importancia: Las compras son el registro de transacciones. Cada compra vincula usuario + tickets.
-->
<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="NovaTicket - Gestion de compras.">
    <meta name="robots" content="noindex, nofollow">
    <title>Compras - NovaTicket Admin</title>
    <link rel="icon" th:href="@{/img/logo.png}" href="/img/logo.png" type="image/png">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link th:href="@{/css/styles.css}" rel="stylesheet">
</head>
<body class="admin-panel">
<header>
    <nav class="nt-navbar nt-navbar-admin" aria-label="Navegacion compras admin">
        <div class="container position-relative d-flex justify-content-center align-items-center">
            <a th:href="@{/admin}" class="nt-admin-back btn btn-outline-secondary btn-sm">Volver a admin</a>
            <a th:href="@{/admin}" class="nt-brand" aria-label="Panel admin NovaTicket">
                <img th:src="@{/img/logo2.png}" src="/img/logo2.png" alt="NovaTicket" class="nt-logo">
            </a>
        </div>
    </nav>
</header>

<main class="container mt-4 crud-container">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h2>Listado de Compras</h2>
        <div>
            <a th:href="@{/compras/nuevo}" class="btn btn-success">Nueva Compra</a>
        </div>
    </div>

    <div th:if="${okMensaje}" class="alert alert-success" th:text="${okMensaje}"></div>
    <div th:if="${errorMensaje}" class="alert alert-danger" th:text="${errorMensaje}"></div>

    <div class="table-responsive">
    <table class="table table-bordered table-striped table-hover align-middle">
        <thead>
        <tr>
            <th>Usuario</th>
            <th>Fecha</th>
            <th>Total</th>
            <th>Acciones</th>
        </tr>
        </thead>
        <tbody>
        <tr th:if="${#lists.isEmpty(compras)}">
            <td colspan="4" class="text-center">No hay compras registradas.</td>
        </tr>
        <tr th:each="compra : ${compras}">
            <td th:text="${usuariosMap[compra.id_usuario] != null ? usuariosMap[compra.id_usuario] : 'ID ' + compra.id_usuario}"></td>
            <td th:text="${compra.fecha}"></td>
            <td th:text="${compra.total}"></td>
            <td>
                <a th:href="@{/compras/editar/{id}(id=${compra.id})}" class="btn btn-warning btn-sm">Editar</a>
                <a th:href="@{/compras/eliminar/{id}(id=${compra.id})}" class="btn btn-danger btn-sm">Eliminar</a>
            </td>
        </tr>
        </tbody>
    </table>
    </div>
</main>
</body>
</html>
