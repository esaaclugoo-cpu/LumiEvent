<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="NovaTicket - Gestion de tickets.">
    <meta name="robots" content="noindex, nofollow">
    <title>Tickets - NovaTicket Admin</title>
    <link rel="icon" th:href="@{/img/logo.png}" href="/img/logo.png" type="image/png">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link th:href="@{/css/styles.css}" rel="stylesheet">
</head>
<body class="admin-panel">
<header>
    <nav class="nt-navbar nt-navbar-admin" aria-label="Navegacion tickets admin">
        <div class="container position-relative d-flex justify-content-center align-items-center">
            <a th:href="@{/admin}" class="nt-admin-back btn btn-outline-secondary btn-sm">Volver a admin</a>
            <a th:href="@{/admin}" class="nt-brand" aria-label="Panel admin NovaTicket">
                <img th:src="@{/img/logo2.png}" src="/img/logo2.png" alt="NovaTicket" class="nt-logo">
            </a>
        </div>
    </nav>
</header>

<main class="container mt-4 crud-container">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h2>Listado de Tickets</h2>
        <div>
            <a th:href="@{/tickets/nuevo}" class="btn btn-success">Nuevo Ticket</a>
        </div>
    </div>

    <div class="table-responsive">
    <table class="table table-bordered table-striped table-hover align-middle">
        <thead>
        <tr>
            <th>Evento</th>
            <th>Asiento</th>
            <th>Tipo</th>
            <th>Compra</th>
            <th>Cantidad</th>
            <th>Precio Unitario</th>
            <th>Acciones</th>
        </tr>
        </thead>
        <tbody>
        <tr th:if="${#lists.isEmpty(tickets)}">
            <td colspan="7" class="text-center">No hay tickets registrados.</td>
        </tr>
        <tr th:each="ticket : ${tickets}">
            <td th:text="${eventosMap[ticket.id_evento] != null ? eventosMap[ticket.id_evento] : 'ID ' + ticket.id_evento}"></td>
            <td th:text="${ticket.id_asiento != null ? (asientosMap[ticket.id_asiento] != null ? asientosMap[ticket.id_asiento] : 'ID ' + ticket.id_asiento) : 'Sin asiento'}"></td>
            <td th:text="${ticket.tipo}"></td>
            <td th:text="${comprasMap[ticket.id_compra] != null ? comprasMap[ticket.id_compra] : 'ID ' + ticket.id_compra}"></td>
            <td th:text="${ticket.cantidad}"></td>
            <td th:text="${ticket.precio_unitario}"></td>
            <td>
                <a th:href="@{/tickets/editar/{id}(id=${ticket.id})}" class="btn btn-warning btn-sm">Editar</a>
                <a th:href="@{/tickets/eliminar/{id}(id=${ticket.id})}" class="btn btn-danger btn-sm">Eliminar</a>
            </td>
        </tr>
        </tbody>
    </table>
    </div>
</main>
</body>
</html>
