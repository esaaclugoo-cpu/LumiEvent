<!--
  Formulario de Lugar - formLugar.html
  Propósito: Crear o editar un lugar (venue para eventos).
  Contenido del formulario:
    1. Nombre: nombre del lugar (ej: "Auditorio Nacional", "Teatro Real")
    2. Dirección: dirección física completa
    3. Ciudad: ciudad donde se ubica

  Atributos Thymeleaf principales:
    - th:object="${lugar}": vincula objeto lugar del modelo
    - th:field: vincula atributos del objeto a inputs
    - th:text: muestra encabezado dinámico (Agregar vs Editar)

  Modelos pasados:
    - lugar: Lugar - objeto con id, nombre, dirección, ciudad
    - lugar.id: 0 si es nuevo, > 0 si es edición

  Procesamiento:
    - POST a /lugares/guardar (para ambas operaciones)

  Validación en backend:
    - Nombre, dirección y ciudad obligatorios
    - Sin validación de duplicados (permite múltiples lugares con mismo nombre en ciudades diferentes)

  Flujo:
    1. Crear: GET /lugares/nuevo muestra formulario vacío
    2. Editar: GET /lugares/editar/{id} carga lugar en formulario
    3. Guardar: POST /lugares/guardar procesa ambos casos
-->
<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="NovaTicket - Formulario de lugar.">
    <meta name="robots" content="noindex, nofollow">
    <title>Formulario Lugar - NovaTicket Admin</title>
    <link rel="icon" th:href="@{/img/logo.png}" href="/img/logo.png" type="image/png">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link th:href="@{/css/styles.css}" rel="stylesheet">
</head>
<body class="admin-panel">
<header>
    <nav class="nt-navbar nt-navbar-admin" aria-label="Navegacion formulario lugares">
        <div class="container position-relative d-flex justify-content-center align-items-center">
            <a th:href="@{/admin}" class="nt-admin-back btn btn-outline-secondary btn-sm">Volver a admin</a>
            <a th:href="@{/admin}" class="nt-brand" aria-label="Panel admin NovaTicket">
                <img th:src="@{/img/logo2.png}" src="/img/logo2.png" alt="NovaTicket" class="nt-logo">
            </a>
        </div>
    </nav>
</header>

<main class="container mt-4">
    <h2 th:text="${lugar.id == 0} ? 'Agregar Lugar' : 'Editar Lugar'"></h2>

    <form th:action="@{/lugares/guardar}" th:object="${lugar}" method="post">
        <input type="hidden" th:field="*{id}" />

        <div class="mb-3">
            <label for="nombre" class="form-label">Nombre</label>
            <input type="text" class="form-control" id="nombre" th:field="*{nombre}" required />
        </div>

        <div class="mb-3">
            <label for="direccion" class="form-label">Direccion</label>
            <input type="text" class="form-control" id="direccion" th:field="*{direccion}" required />
        </div>

        <div class="mb-3">
            <label for="ciudad" class="form-label">Ciudad</label>
            <input type="text" class="form-control" id="ciudad" th:field="*{ciudad}" required />
        </div>

        <button type="submit" class="btn btn-primary">Guardar</button>
        <a th:href="@{/lugares}" class="btn btn-secondary">Cancelar</a>
        <a th:href="@{/admin}" class="btn btn-outline-secondary">Volver a admin</a>
    </form>
</main>
</body>
</html>
