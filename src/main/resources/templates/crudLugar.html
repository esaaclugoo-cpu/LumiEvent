<!--
  Listado de Lugares - crudLugar.html
  Propósito: Mostrar tabla CRUD de todos los lugares registrados (venues para eventos).
  Contenido: Tabla con columnas:
    1. Nombre: nombre del lugar (ej: Auditorio Nacional)
    2. Dirección: dirección física
    3. Ciudad: ciudad donde se ubica
    4. Acciones: botones Editar y Eliminar

  Atributos Thymeleaf principales:
    - th:each: lugar : ${lugares} - itera sobre lista de lugares
    - th:text: muestra valores de lugar
    - th:href: rutas dinámicas a editar (/lugares/editar/{id}) y eliminar

  Modelos pasados:
    - lugares: List<Lugar> - todos los lugares

  Acciones:
    - Nuevo lugar: botón verde que lleva a /lugares/nuevo
    - Editar: GET a /lugares/editar/{id} carga formulario con datos
    - Eliminar: GET a /lugares/eliminar/{id} elimina lugar y redirecciona

  Dependencias: Los lugares no pueden eliminarse si tienen eventos asociados (foreign key).

  Relaciones: Lugar -> tiene muchos asientos -> están en eventos
-->
<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="NovaTicket - Gestion de lugares.">
    <meta name="robots" content="noindex, nofollow">
    <title>Lugares - NovaTicket Admin</title>
    <link rel="icon" th:href="@{/img/logo.png}" href="/img/logo.png" type="image/png">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link th:href="@{/css/styles.css}" rel="stylesheet">
</head>
<body class="admin-panel">
<header>
    <nav class="nt-navbar nt-navbar-admin" aria-label="Navegacion lugares admin">
        <div class="container position-relative d-flex justify-content-center align-items-center">
            <a th:href="@{/admin}" class="nt-admin-back btn btn-outline-secondary btn-sm">Volver a admin</a>
            <a th:href="@{/admin}" class="nt-brand" aria-label="Panel admin NovaTicket">
                <img th:src="@{/img/logo2.png}" src="/img/logo2.png" alt="NovaTicket" class="nt-logo">
            </a>
        </div>
    </nav>
</header>

<main class="container mt-4 crud-container">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h2>Listado de Lugares</h2>
        <div>
            <a th:href="@{/lugares/nuevo}" class="btn btn-success">Nuevo Lugar</a>
        </div>
    </div>

    <div th:if="${okMensaje}" class="alert alert-success" th:text="${okMensaje}"></div>
    <div th:if="${errorMensaje}" class="alert alert-danger" th:text="${errorMensaje}"></div>

    <div class="table-responsive">
    <table class="table table-bordered table-striped table-hover align-middle">
        <thead>
        <tr>
            <th>Nombre</th>
            <th>Direccion</th>
            <th>Ciudad</th>
            <th>Acciones</th>
        </tr>
        </thead>
        <tbody>
        <tr th:if="${#lists.isEmpty(lugares)}">
            <td colspan="4" class="text-center">No hay lugares registrados.</td>
        </tr>
        <tr th:each="lugar : ${lugares}">
            <td th:text="${lugar.nombre}"></td>
            <td th:text="${lugar.direccion}"></td>
            <td th:text="${lugar.ciudad}"></td>
            <td>
                <a th:href="@{/lugares/editar/{id}(id=${lugar.id})}" class="btn btn-warning btn-sm">Editar</a>
                <a th:href="@{/lugares/eliminar/{id}(id=${lugar.id})}" class="btn btn-danger btn-sm">Eliminar</a>
            </td>
        </tr>
        </tbody>
    </table>
    </div>
</main>
</body>
</html>
