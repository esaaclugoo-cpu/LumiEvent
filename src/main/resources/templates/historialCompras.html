<!--
  Página de Historial de Compras - historialCompras.html
  Propósito: Mostrar historial completo de compras del usuario (cliente) o todas (admin).
  Contenido:
    1. Cards por compra: una card por cada compra agrupada por fecha y total
    2. Tabla de detalles: dentro de cada card, muestra tickets asociados
    3. Información de ticket: id, evento, fecha evento, lugar, tipo, cantidad, precio unitario, subtotal, asiento
    4. Asiento: muestra fila-número (zona) si está asignado, sino "Sin asignar"

  Atributos Thymeleaf principales:
    - th:each: compra : ${historialCompras} - itera sobre compras
    - th:each: detalle : ${compra.detalles} - itera sobre tickets de cada compra
    - th:text: muestra valores de compra (fecha, total) y detalle (evento, asiento, precio)
    - th:if, th:unless: muestra "Sin asignar" si asiento es null
    - th:classappend="${esAdminHistorial} ? 'class'": estilos condicionales (no usado en este caso)

  Modelos pasados:
    - historialCompras: List<CompraDetalle> - compras del usuario o todas si es admin
    - compra.detalles: List<DetalleCompra> - tickets vinculados a cada compra
    - esAdminHistorial: boolean - true si se visualiza desde panel admin (/compras)

  Estructura de datos de ticket:
    - idTicket: id del ticket
    - nombreEvento: nombre del evento
    - fechaEvento: fecha del evento
    - nombreLugar, ciudadLugar: lugar donde ocurre el evento
    - tipo: general/vip/premium
    - cantidad: cantidad de entradas de este tipo
    - precioUnitario: precio por entrada
    - subtotal: cantidad * precioUnitario
    - fila, numeroAsiento, zona: ubicación en el lugar (puede ser null si no asignado)

  Flujo:
    1. Cliente autenticado accede a /cliente/historial (CompraController.mostrarHistorialCliente)
    2. Admin accede a /historial (CompraController.mostrarHistorial)
    3. Se obtienen todas las compras del usuario/admin con sus detalles de tickets
    4. Se renderiza tabla agrupada por compra
-->
<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="NovaTicket - Historial de compras de entradas.">
    <meta name="robots" content="noindex, nofollow">
    <title>Historial de compras - NovaTicket</title>
    <link rel="icon" th:href="@{/img/logo.png}" href="/img/logo.png" type="image/png">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link th:href="@{/css/styles.css}" rel="stylesheet">
</head>
<body>
<header>
    <nav class="nt-navbar" aria-label="Navegacion historial">
        <div class="container d-flex align-items-center justify-content-between gap-3">
            <a th:href="@{/cliente/home}" class="nt-brand" aria-label="Inicio NovaTicket">
                <img th:src="@{/img/logo2.png}" src="/img/logo2.png" alt="NovaTicket" class="nt-logo">
            </a>
            <a th:href="@{/cliente/home}" class="nt-nav-link">Inicio</a>
        </div>
    </nav>
</header>

<main class="container py-4">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h1 class="h3 mb-0" th:text="${esAdminHistorial} ? 'Historial global de compras' : 'Mis compras'">Mis compras</h1>
    </div>

    <div th:if="${#lists.isEmpty(historialCompras)}" class="alert alert-info">
        No hay compras registradas.
    </div>

    <div th:each="compra : ${historialCompras}" class="card shadow-sm mb-4">
        <div class="card-header d-flex justify-content-between flex-wrap gap-2">
            <span><strong>Fecha:</strong> <span th:text="${compra.fecha}"></span></span>
            <span><strong>Total:</strong> <span th:text="${compra.total}"></span> EUR</span>
        </div>
        <div class="card-body p-0">
            <div class="table-responsive">
                <table class="table table-striped table-hover mb-0">
                    <thead>
                    <tr>
                        <th>Ticket</th>
                        <th>Evento</th>
                        <th>Fecha evento</th>
                        <th>Lugar</th>
                        <th>Tipo</th>
                        <th>Cantidad</th>
                        <th>Precio unitario</th>
                        <th>Subtotal</th>
                        <th>Asiento</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:if="${#lists.isEmpty(compra.detalles)}">
                        <td colspan="9" class="text-center">Compra sin tickets asociados.</td>
                    </tr>
                    <tr th:each="detalle : ${compra.detalles}">
                        <td th:text="${detalle.idTicket}"></td>
                        <td th:text="${detalle.nombreEvento}"></td>
                        <td th:text="${detalle.fechaEvento}"></td>
                        <td>
                            <span th:text="${detalle.nombreLugar}"></span>
                            <span th:if="${detalle.ciudadLugar != null}" th:text="' - ' + ${detalle.ciudadLugar}"></span>
                        </td>
                        <td th:text="${detalle.tipo}"></td>
                        <td th:text="${detalle.cantidad}"></td>
                        <td th:text="${detalle.precioUnitario}"></td>
                        <td th:text="${detalle.subtotal}"></td>
                        <td>
                            <span th:if="${detalle.fila != null}" th:text="${detalle.fila} + '-' + ${detalle.numeroAsiento} + ' (' + ${detalle.zona} + ')'">Asignado</span>
                            <span th:unless="${detalle.fila != null}">Sin asignar</span>
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</main>
</body>
</html>
