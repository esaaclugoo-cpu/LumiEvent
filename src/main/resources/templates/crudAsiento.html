<!--
  Listado de Asientos - crudAsiento.html
  Propósito: Mostrar tabla CRUD de todos los asientos registrados en el sistema.
  Contenido: Tabla con columnas:
    1. Lugar: nombre del lugar asociado (traducción desde ID)
    2. Fila: letra de fila del asiento (ej: A, B, C)
    3. Número asiento: número secuencial del asiento en la fila
    4. Zona: tipo de asiento (general/vip/premium) - define precio
    5. Acciones: botones Editar y Eliminar

  Atributos Thymeleaf principales:
    - th:each: asiento : ${asientos} - itera sobre lista de asientos
    - th:text: muestra valores de asiento
    - lugares[asiento.id_lugar]: Map que traduce ID de lugar a nombre
    - th:href: rutas dinámicas a editar (/asientos/editar/{id}) y eliminar

  Modelos pasados:
    - asientos: List<Asiento> - todos los asientos
    - lugares: Map<Integer, String> - mapeo id_lugar -> nombre lugar

  Acciones:
    - Nuevo asiento: botón que lleva a /asientos/nuevo
    - Editar: GET a /asientos/editar/{id} carga formulario
    - Eliminar: GET a /asientos/eliminar/{id} elimina y redirecciona a listado

  Creación masiva: En el formulario de nuevo asiento, se pueden crear múltiples asientos
    de una fila con diferentes zonas (general, vip, premium).

  Importancia: Los asientos son el inventario de entradas. Vinculan evento -> lugar -> zona -> precio.
-->
<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="NovaTicket - Gestion de asientos.">
    <meta name="robots" content="noindex, nofollow">
    <title>Asientos - NovaTicket Admin</title>
    <link rel="icon" th:href="@{/img/logo.png}" href="/img/logo.png" type="image/png">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link th:href="@{/css/styles.css}" rel="stylesheet">
</head>
<body class="admin-panel">
<header>
    <nav class="nt-navbar nt-navbar-admin" aria-label="Navegacion asientos admin">
        <div class="container position-relative d-flex justify-content-center align-items-center">
            <a th:href="@{/admin}" class="nt-admin-back btn btn-outline-secondary btn-sm">Volver a admin</a>
            <a th:href="@{/admin}" class="nt-brand" aria-label="Panel admin NovaTicket">
                <img th:src="@{/img/logo2.png}" src="/img/logo2.png" alt="NovaTicket" class="nt-logo">
            </a>
        </div>
    </nav>
</header>

<main class="container mt-4 crud-container">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h2>Listado de Asientos</h2>
        <div>
            <a th:href="@{/asientos/nuevo}" class="btn btn-primary">Nuevo Asiento</a>
        </div>
    </div>

    <div th:if="${okMensaje}" class="alert alert-success" th:text="${okMensaje}"></div>
    <div th:if="${errorMensaje}" class="alert alert-danger" th:text="${errorMensaje}"></div>

    <div class="table-responsive">
    <table class="table table-bordered table-striped table-hover align-middle">
        <thead class="table-dark">
        <tr>
            <th>Lugar</th>
            <th>Fila</th>
            <th>Numero Asiento</th>
            <th>Zona</th>
            <th>Acciones</th>
        </tr>
        </thead>
        <tbody>
        <tr th:if="${#lists.isEmpty(asientos)}">
            <td colspan="5" class="text-center">No hay asientos registrados.</td>
        </tr>
        <tr th:each="asiento : ${asientos}">
            <td th:text="${lugares[asiento.id_lugar] != null ? lugares[asiento.id_lugar] : 'ID ' + asiento.id_lugar}"></td>
            <td th:text="${asiento.fila}"></td>
            <td th:text="${asiento.numero_asiento}"></td>
            <td th:text="${asiento.zona}"></td>
            <td>
                <a th:href="@{/asientos/editar/{id}(id=${asiento.id})}" class="btn btn-warning btn-sm">Editar</a>
                <a th:href="@{/asientos/eliminar/{id}(id=${asiento.id})}" class="btn btn-danger btn-sm">Eliminar</a>
            </td>
        </tr>
        </tbody>
    </table>
    </div>
</main>
</body>
</html>
